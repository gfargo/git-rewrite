name: Bug Report
description: Report a bug or unexpected behaviour in git-rewrite
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below so we can investigate.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: What went wrong?
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command run
      description: The exact `git-rewrite` command you ran.
      placeholder: "git-rewrite --map-email old@example.com new@example.com"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour / error output
      description: What actually happened? Paste any error output here.
      render: shell
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: "OS, Python version, and whether git-filter-repo is installed."
      placeholder: "macOS 14.5, Python 3.12.3, git-filter-repo: yes"
    validations:
      required: true
