name: Feature Request
description: Suggest a new feature or enhancement for git-rewrite
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! Please fill out the fields below to help us understand your request.

  - type: textarea
    id: motivation
    attributes:
      label: Problem / motivation
      description: What problem does this solve? What use case are you trying to address?
      placeholder: "I'm trying to do X but currently there's no way to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or change you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative approaches or workarounds?
    validations:
      required: false
