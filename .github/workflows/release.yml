name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/git-rewrite
    permissions:
      id-token: write  # required for OIDC trusted publishing

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  update-homebrew:
    name: Update Homebrew formula
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Wait for PyPI to propagate
        run: sleep 30

      - name: Compute sha256 of PyPI sdist
        id: sha
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://files.pythonhosted.org/packages/source/g/git-rewrite/git_rewrite-${VERSION}.tar.gz"
          for i in 1 2 3 4 5; do
            SHA=$(curl -sL "$URL" | shasum -a 256 | cut -d' ' -f1)
            if [ ${#SHA} -eq 64 ]; then break; fi
            sleep 10
          done
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          repository: gfargo/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          cd homebrew-tap
          sed -i'' -e 's|url ".*"|url "${{ steps.sha.outputs.url }}"|' Formula/git-rewrite.rb
          sed -i'' -e 's|sha256 ".*"|sha256 "${{ steps.sha.outputs.sha256 }}"|' Formula/git-rewrite.rb

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/git-rewrite.rb
          git commit -m "git-rewrite ${{ steps.version.outputs.version }}"
          git push
